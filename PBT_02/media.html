<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Giới Thiệu Sản Phẩm Multimedia</title>
</head>

<body>

    <header>
        <svg class="svg-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke="#007bff" stroke-width="5" fill="#e7f1ff" />
            <rect x="30" y="30" width="40" height="40" fill="#007bff" />
            <text x="50" y="85" font-size="12" text-anchor="middle" font-family="Arial" fill="#007bff">LOGO</text>
        </svg>
        <h1>Công Nghệ Tương Lai</h1>
        <p>Trải nghiệm sản phẩm qua đa phương tiện</p>
    </header>

    <section id="gallery">
        <h2>Hình Ảnh Sản Phẩm</h2>

        <figure>
            <img src="https://bizweb.dktcdn.net/100/524/018/products/9718b9b7-8444-49d0-8e44-c9deb6f90a48-1732334869380.jpg?v=1732334872953"
                alt="TrieuVan motonuclear" loading="lazy">
            <figcaption>Hình 1: TrieuVan motonuclear</figcaption>
        </figure>

        <figure>
            <img src="https://cdn-media.sforum.vn/storage/app/media/CTVSEO_Maihue/H%C3%ACnh%20n%E1%BB%81n%20Gundam/hinh-nen-gundam-1.jpg"
                alt="Gundam" loading="lazy">
            <figcaption>Hình 2: Gundam</figcaption>
        </figure>

        <figure>
            <img src="https://cdn-media.sforum.vn/storage/app/media/CTVSEO_Maihue/H%C3%ACnh%20n%E1%BB%81n%20Gundam/hinh-nen-gundam-3.jpg"
                alt="Astray" loading="lazy">
            <figcaption>Hình 3: Astray</figcaption>
        </figure>
    </section>

    <section id="youtube-video">
        <h2>Video Đánh Giá Sản Phẩm (YouTube)</h2>
        <div class="video-container">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/eNXPoaD_Tgc"
                title="YouTube video player"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>
    </section>

    <section id="local-video">
        <h2>Video Trải Nghiệm Thực Tế</h2>
        <video controls poster="https://via.placeholder.com/800x450.png?text=Sơn+Tùng+MTP+Poster">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            <source src="https://www.w3schools.com/html/mov_bbb.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
    </section>

    <section id="audio-intro">
        <h2>Nhạc Nền Giới Thiệu</h2>
        <p>Nghe bản nhạc chủ đề của chúng tôi:</p>
        <audio controls>
            <source src="https://www.w3schools.com/html/horse.ogg" type="audio/ogg">
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ thẻ âm thanh.
        </audio>
    </section>

    <footer style="text-align: center; padding: 20px; font-size: 0.8em; color: #888;">
        &copy; 2026 Trang Sản Phẩm Multimedia. Bản quyền thuộc về dmt.
    </footer>

</body>

</html>
